<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tỏ tình ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    overflow:hidden;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
}

/* HERO */
.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    padding:20px;
}

h1{
    font-size: clamp(32px,5vw,60px);
    margin-bottom:20px;
    animation: fadeIn 2s ease;
}

p{
    max-width:600px;
    font-size:18px;
    line-height:1.6;
    margin-bottom:30px;
    animation: fadeIn 3s ease;
}

.avatar{
    width:160px;
    height:160px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    margin-bottom:20px;
    animation: zoomIn 2s ease;
}

/* BUTTON */
.buttons{
    display:flex;
    gap:15px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.yes{
    background:#ff4d6d;
    color:white;
}

.no{
    background:white;
    color:#ff4d6d;
    position:absolute;
}

.music-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:white;
    color:#ff4d6d;
    border-radius:50%;
    width:50px;
    height:50px;
    border:none;
    cursor:pointer;
}

/* POPUP */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:0.5s;
}

.popup.active{
    opacity:1;
    pointer-events:auto;
}

.popup-content{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    color:#ff4d6d;
    animation: zoomIn 0.5s ease;
}

/* HEART */
.heart{
    position:fixed;
    color:#ff4d6d;
    animation: float 5s linear infinite;
}

/* CLOCK */
.timer{
    margin-top:20px;
    font-size:16px;
    opacity:0.9;
}

/* ANIMATION */
@keyframes float{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes zoomIn{
    from{transform:scale(0.5);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

/* MOBILE */
@media(max-width:600px){
    .buttons{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<div class="container">
    <img src="[LINK ẢNH]" class="avatar">

    <h1>[TÊN NGƯỜI ẤY] à 💖</h1>

    <p>
        Từ lúc gặp em, thế giới của anh trở nên đặc biệt hơn...<br>
        [LỜI NHẮN TỎ TÌNH]<br><br>
        Anh thích em rất nhiều 💕<br>
        Em làm người yêu anh nhé?
    </p>

    <div class="buttons">
        <button class="yes" onclick="acceptLove()">💖 Đồng ý</button>
        <button class="no" id="noBtn">Không đồng ý 😢</button>
    </div>

    <div class="timer" id="timer"></div>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<audio id="music" loop>
    <source src="[LINK NHẠC]" type="audio/mp3">
</audio>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2>Yayyyy 💕</h2>
        <p>Chúc mừng! Từ giờ em là người yêu của anh rồi 🥰</p>
        <p>Anh sẽ luôn yêu và bảo vệ em ❤️</p>
    </div>
</div>

<script>
// Nút chạy trốn
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// Accept
function acceptLove(){
    document.getElementById("popup").classList.add("active");
}

// Hearts
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random()*20+10+"px";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),5000);
}
setInterval(createHeart,300);

// Music
let playing=false;
function toggleMusic(){
    const music=document.getElementById("music");
    if(!playing){
        music.play();
        playing=true;
    }else{
        music.pause();
        playing=false;
    }
}

// Timer (tính từ ngày bạn thích người ta)
const startDate = new Date("2024-01-01"); // SỬA NGÀY Ở ĐÂY

function updateTimer(){
    const now = new Date();
    const diff = now - startDate;

    const days = Math.floor(diff / (1000*60*60*24));
    document.getElementById("timer").innerText =
        "Anh đã thích em được " + days + " ngày rồi ❤️";
}
setInterval(updateTimer,1000);
updateTimer();
</script>

</body>
</html>
